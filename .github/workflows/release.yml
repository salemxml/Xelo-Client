name: Build Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'إنشاء GitHub Release بعد البناء'
        required: false
        default: true
        type: boolean
      version_name:
        description: 'اسم الإصدار (مثال: 1.7)'
        required: false
        default: ''
        type: string

jobs:
  release-build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      ANDROID_NDK_VERSION: r27c

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Update submodules (with retry)
        run: |
          for i in 1 2 3; do
            git submodule update --init --recursive && break
            echo "Retry $i..."
            sleep 10
          done

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK ${{ env.ANDROID_NDK_VERSION }}
        run: |
          sdkmanager "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-release-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-release-
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: List generated APK files
        run: |
          echo "APK files generated:"
          find app/build/outputs/apk/release -name "*.apk" -type f
          echo ""
          echo "APK sizes:"
          ls -lh app/build/outputs/apk/release/*.apk 2>/dev/null || echo "No APK files found"

      - name: Get APK info
        id: apk_info
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" -type f | head -1)
          if [ -n "$APK_PATH" ]; then
            APK_SIZE=$(stat -c%s "$APK_PATH")
            APK_SIZE_MB=$(echo "scale=1; $APK_SIZE / 1048576" | bc)
            APK_NAME=$(basename "$APK_PATH")
            echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
            echo "apk_size_mb=$APK_SIZE_MB" >> $GITHUB_OUTPUT
            echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
            echo "Found APK: $APK_NAME ($APK_SIZE_MB MB)"
          else
            echo "ERROR: No APK file found!"
            exit 1
          fi

      - name: Determine version name
        id: version
        run: |
          if [ -n "${{ inputs.version_name }}" ]; then
            VERSION="${{ inputs.version_name }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="build-${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Upload Release APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: xelo-release-apk-${{ steps.version.outputs.version }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: error

      - name: Upload native debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: xelo-native-symbols-${{ steps.version.outputs.version }}
          path: app/build/outputs/native-debug-symbols/release/
          retention-days: 365
          if-no-files-found: ignore

      - name: Create GitHub Release
        if: inputs.create_release == true || github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "Xelo Client ${{ steps.version.outputs.version }}"
          files: app/build/outputs/apk/release/*.apk
          body: |
            ## Xelo Client ${{ steps.version.outputs.version }}

            ### 📱 معلومات APK
            - **الملف:** `${{ steps.apk_info.outputs.apk_name }}`
            - **الحجم:** ~${{ steps.apk_info.outputs.apk_size_mb }} MB
            - **Build رقم:** ${{ github.run_number }}
            - **Commit:** ${{ github.sha }}

            ### 🔧 طريقة التثبيت
            1. قم بتنزيل ملف APK من القسم أدناه
            2. فعّل "مصادر غير معروفة" في إعدادات الأندرويد
            3. ثبّت APK

            ### ⚙️ المتطلبات
            - Android 8.0 (API 26) أو أعلى
            - معالج arm64-v8a

            ### 🔗 روابط
            - [موقع Xelo](https://xeloclient.in)
            - [Discord](https://dsc.gg/xelo)
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
